name: AI LANG GRAPH ENGINE [GPT{gpt-4o-mini}]

on:
  schedule:
    - cron: '30 10 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
          pandas numpy plotly scikit-learn \
          openai python-dotenv \
          jupyter ipykernel papermill firebase-admin \
          langchain==0.2.14 \
          langgraph==0.2.19 \
          langchain-openai==0.1.22

      - name: Install kernel
        run: python -m ipykernel install --user --name python3

      - name: Create required folders
        run: |
          mkdir -p reports
          ls -la

      - name: RUN ENGINE AGENT
        run: python engine/langgraph.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify reports folder
        run: |
          cd  reports
          ls -la

      - name: Upload Firebase Data
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/upload_agent_report_to_firebase.py
